name: Cloud APK Generator

on:
  push:
    branches: [ main ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (For Capacitor)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm install

      # === NEW STEP 1: Build your web application ===
      - name: Build Web Assets
        run: npm run build

      # === NEW STEP 2: Sync assets into the Android folder ===
      - name: Capacitor Sync
        run: npx cap sync android

       Silber Step up Java Runtime (JDK 21)
      - name: Set up Java Runtime (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' 

       Silber Grant Gradle Permissions
      - name: Grant Gradle Permissions
        run: chmod +x android/gradlew

      - name: Compile APK via Cloud
        run: |
          cd android
          ./gradlew assembleDebug

       Silber Upload Finished App to GitHub
      - name: Upload Finished App to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Premium-PDF-Reader
          path: android/app/build/outputs/apk/debug/app-debug.apk
