name: Cloud APK Generator

on:
  push:
    branches: [ main ] # Triggers every time you push code to your main branch
  workflow_dispatch: # Allows you to trigger the build manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (For Capacitor)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Project Dependencies
        run: npm install

      - name: Set up Java Runtime (JDK 25)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25' # Fulfills that modern plugin requirement effortlessly!

      - name: Grant Gradle Permissions
        run: chmod +x android/gradlew

      - name: Compile APK via Cloud
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Finished App to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Premium-PDF-Reader
          path: android/app/build/outputs/apk/debug/app-debug.apk
